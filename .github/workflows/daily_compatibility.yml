name: HA Daily Compatibility Check
on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'  # Daily at 6 AM UTC

jobs:
  compatibility:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    strategy:
      fail-fast: false
      matrix:
        ha-version: ["stable", "beta", "dev"]
        python-version: ["3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-test.txt
      - name: Install Home Assistant (${{ matrix.ha-version }})
        run: |
          if [ "${{ matrix.ha-version }}" == "dev" ]; then
            pip install --upgrade "homeassistant @ git+https://github.com/home-assistant/core.git@dev"
          elif [ "${{ matrix.ha-version }}" == "beta" ]; then
            pip install --pre --upgrade homeassistant
          else
            pip install --upgrade homeassistant
          fi
      - name: Show installed HA version
        run: pip show homeassistant | grep Version
      - name: Run tests
        run: python -m pytest tests/ -v --tb=short
      - name: Create issue on failure
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            const title = `⚠️ Compatibility check failed: HA ${{ matrix.ha-version }}`;
            const body = `The daily compatibility check failed for **HA ${{ matrix.ha-version }}** on Python ${{ matrix.python-version }}.\n\n[View workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`;
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'compatibility'
            });
            const existing = issues.data.find(i => i.title === title);
            if (!existing) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['compatibility', 'bug']
              });
            }